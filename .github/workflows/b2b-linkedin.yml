name: B2B content (LinkedIn)
# LinkedIn B2B drafts are prepared before 9 AM Central so they are ready when Macy starts.
#   Tuesday  13:00 UTC (8:00 AM Central) - evergreen run, 5 posts
#   Thursday 13:00 UTC (8:00 AM Central) - lighter evergreen run, 3 posts
# Every LinkedIn run is multi-audience: posts are split across payors and
# self-insured employers by weight (default 16/14), and the weights scale to
# whatever count is requested. Scheduled runs use the small default counts;
# a manual run with count 30 fills Publer in one pass. Generation is batched in
# fives so large runs never truncate.
# Runnable on demand from the Actions tab, including the Centene campaign overlay
# (campaign runs are payor-only and bypass the audience split).
on:
  schedule:
    - cron: "0 13 * * 2"
    - cron: "0 13 * * 4"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate only, do not post to Publer"
        type: boolean
        default: false
      count:
        description: "Posts to generate (blank = 5; use 30 to fill Publer, split across audiences)"
        type: string
        default: ""
      campaign:
        description: "Campaign overlay, e.g. centene (blank = evergreen multi-audience rotation)"
        type: string
        default: ""
permissions:
  contents: write
  issues: write
# Serialize with the B2C workflow so the two never write history.json at once.
concurrency:
  group: social-agent
  cancel-in-progress: false
jobs:
  generate:
    runs-on: ubuntu-latest
    # A 30-post run makes several sequential Sonnet calls; cap the job so a stall
    # cannot run away. Normal runs finish in a few minutes.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate LinkedIn posts and create Publer drafts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PUBLER_API_KEY: ${{ secrets.PUBLER_API_KEY }}
        run: |
          ARGS="--platform linkedin"
          # Thursday's scheduled run is the lighter 3-post run. Tuesday uses the default 5.
          if [ "${{ github.event.schedule }}" = "0 13 * * 4" ]; then
            ARGS="$ARGS --count 3"
          fi
          # Manual overrides from the Actions tab (workflow_dispatch only).
          if [ -n "${{ inputs.count }}" ]; then
            ARGS="$ARGS --count ${{ inputs.count }}"
          fi
          if [ -n "${{ inputs.campaign }}" ]; then
            ARGS="$ARGS --campaign ${{ inputs.campaign }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "Running: python generate_and_post.py $ARGS"
          python generate_and_post.py $ARGS
      - name: Add run summary to the Actions log
        if: always()
        run: cat run_summary.md >> "$GITHUB_STEP_SUMMARY" || true
      - name: Commit updated run state
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "brainyact-agent"
          git config user.email "actions@users.noreply.github.com"
          git add history.json
          git diff --staged --quiet || git commit -m "chore: update LinkedIn run state [skip ci]"
          git pull --rebase origin ${GITHUB_REF_NAME} || true
          git push
      - name: Notify Macy (open a review issue)
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "BrainyAct B2B (LinkedIn) drafts ready ($(date +%F))" \
            --body-file run_summary.md
