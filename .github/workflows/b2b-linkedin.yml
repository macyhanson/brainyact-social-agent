name: B2B content (LinkedIn)

# B2B posts go out Tuesday at 13:00 UTC (8:00 AM Central), drafts ready before 9.
# Runnable on demand from the Actions tab.
on:
  schedule:
    - cron: "0 13 * * 2"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate only, do not post to Publer"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

# Serialize with the B2C workflow so the two never write history.json at once.
concurrency:
  group: social-agent
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate LinkedIn posts and create Publer drafts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PUBLER_API_KEY: ${{ secrets.PUBLER_API_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python generate_and_post.py --dry-run --platform linkedin
          else
            python generate_and_post.py --platform linkedin
          fi

      - name: Add run summary to the Actions log
        if: always()
        run: cat run_summary.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Commit advanced rotation state
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "brainyact-agent"
          git config user.email "actions@users.noreply.github.com"
          git add history.json
          git diff --staged --quiet || git commit -m "chore: advance LinkedIn rotation [skip ci]"
          git pull --rebase origin ${GITHUB_REF_NAME} || true
          git push

      - name: Notify Macy (open a review issue)
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "BrainyAct B2B (LinkedIn) drafts ready ($(date +%F))" \
            --body-file run_summary.md
