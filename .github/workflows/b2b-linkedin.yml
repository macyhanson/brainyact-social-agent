name: LinkedIn B2B — The Off-Ramp (Payors, Employers, TPAs, Brokers)

on:
  schedule:
    # 13:00 UTC every Monday.
    # = 8:00 AM Central in summer (CDT), 7:00 AM Central in winter (CST).
    # One line, accepted one-hour winter drift.
    # Scheduled runs use the default phase (segment). For a broad-phase run,
    # trigger manually from the Actions tab and pick "broad".
    - cron: "0 13 * * 1"
  workflow_dispatch:
    inputs:
      phase:
        description: "Campaign phase"
        type: choice
        default: "segment"
        options:
          - segment
          - broad
      campaign_active:
        description: "Campaign mode (uncheck for the standard 2-audience run)"
        type: boolean
        default: true

permissions:
  contents: write          # needed to commit the updated ledger + carousel files

concurrency:
  group: linkedin-b2b
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate posts and push Publer drafts
        working-directory: path/to/this/folder   # <-- set to where these files live in your repo
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PUBLER_API_KEY: ${{ secrets.PUBLER_API_KEY }}
          PUBLER_WORKSPACE_ID: ${{ secrets.PUBLER_WORKSPACE_ID }}
          PUBLER_LINKEDIN_ACCOUNT_ID: ${{ secrets.PUBLER_LINKEDIN_ACCOUNT_ID }}
          # Manual runs use the picked phase; scheduled runs default to segment.
          CAMPAIGN_PHASE: ${{ github.event.inputs.phase || 'segment' }}
          CAMPAIGN_ACTIVE: ${{ github.event.inputs.campaign_active || 'true' }}
        run: node generate.mjs

      - name: Commit ledger and carousel scripts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "LinkedIn B2B run $(date -u +%Y-%m-%d)"
          git push

      - name: Upload carousel scripts as artifact
        uses: actions/upload-artifact@v4
        with:
          name: carousels
          path: path/to/this/folder/out/*.md
          if-no-files-found: ignore
